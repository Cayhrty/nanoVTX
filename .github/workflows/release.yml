name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create zip archive
        run: |
          zip -r nanoVTX.zip . \
            -x ".git/*" \
            -x ".git" \
            -x ".github/*" \
            -x ".github"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nanoVTX.zip
          generate_release_notes: true
